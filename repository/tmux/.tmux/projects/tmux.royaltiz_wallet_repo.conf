source-file ~/.tmux/tmux.conf

# Session 0
new-session -s 0_cli -n root
new-window -n cli
# Session 1
setenv -g PROJECT ~/workspace/royaltiz/wallet/repo
setenv -g PATH $PATH:~/workspace/royaltiz/wallet/repo/node_modules/.bin
new-session -s 1_project -n cli -c ~/workspace/royaltiz/wallet/repo
new-window -n vim -c ~/workspace/royaltiz/wallet/repo
new-window -n llm -c ~/workspace/royaltiz/wallet/repo
new-window -n job -c ~/workspace/royaltiz/wallet/repo
new-window -n log -c ~/workspace/royaltiz/wallet/repo
new-window -n app -c ~/workspace/royaltiz/wallet/repo
select-window -t 1_project:cli
